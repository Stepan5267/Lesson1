<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Text Decoration</title>
    <link rel="stylesheet" href="4.css">
</head>
<body>

<p class="underline">Это подчеркнутый текст.</p>
<p class="overline">Это надчеркнутый текст</p>
<p class="line-through">Это зачеркнутый текст</p>
<p class="underline-line-through">Это подчеркнутый и зачеркнутый текст</p>

</body>
</html>
